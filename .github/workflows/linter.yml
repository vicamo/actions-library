name: Lint Codebase

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load super-linter configuration
        run: |
          ( \
            cat .github/linters/super-linter.env | \
            sed -e "s,^\(GITHUB_ACTIONS_ZIZMOR_CONFIG_FILE=\),\1${GITHUB_WORKSPACE}/," \
                -e "s,^\(GITHUB_ACTIONS_ZIZMOR_LINTER_RULES=\),\1${GITHUB_WORKSPACE}/,"; \
          ) >> "$GITHUB_ENV"
      - name: Lint Codebase
        id: super-linter
        uses: super-linter/super-linter/slim@v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
