name: Debian Releases

on:
  pull_request:
    branches:
      - main
    paths:
      - 'debian-releases/**'
      - '!debian-releases/*.md'
  push:
    branches:
      - main
    paths:
      - 'debian-releases/**'
      - '!debian-releases/*.md'
  schedule:
    - cron: '30 3 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Output
    runs-on: ubuntu-latest
    outputs:
      has-diff: ${{ steps.diff.outputs.has-diff }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install jq
        run: |
          if ! which jq; then
            sudo apt-get update --quiet
            sudo apt-get install --no-install-recommends --yes jq
          fi
          jq --version
      - name: Regenerate release info
        id: regenerate
        run: |
          full_json="$(./debian-releases/buildinfo.sh)"
          echo "::group::Regenerated JSON"
          echo "${full_json}" | jq
          echo "::endgroup::"
          echo 'json='"${full_json}" >> "${GITHUB_OUTPUT}"

      - name: Hardcoded release info
        id: hardcoded
        uses: ./debian-releases

      - name: Diff
        id: diff
        env:
          RELEASE_INFO_REGEN: ${{ steps.regenerate.outputs.json }}
          RELEASE_INFO_HARDCODED: ${{ steps.hardcoded.outputs.json }}
        run: |
          echo "${RELEASE_INFO_REGEN}" | jq -M --sort-keys . > regen.json
          echo "${RELEASE_INFO_HARDCODED}" | jq -M --sort-keys . > hardcoded.json
          if ! diff -Nu ./regen.json ./hardcoded.json; then
            echo "has-diff=true" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/upload-artifact@v7
        if: steps.diff.outputs.has-diff == 'true'
        with:
          name: debian-releases-jsons
          retention-days: 7
          path: |
            regen.json
            hardcoded.json

      - name: Fail on diff
        if:
          steps.diff.outputs.has-diff == 'true' && github.event_name !=
          'schedule' && github.event_name != 'workflow_dispatch'
        run: exit 1

  update:
    name: Create Update PR
    needs: validate
    if: |
      needs.validate.outputs.has-diff == 'true' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install jq
        run: |
          if ! which jq; then
            sudo apt-get update --quiet
            sudo apt-get install --no-install-recommends --yes jq
          fi

      - name: Regenerate and update action.yml
        run: ./debian-releases/buildinfo.sh --update-action-yml > /dev/null

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.ACTIONS_LIBRARY_AUTO_PULL_REQUEST }}
          branch: auto/debian-releases-update
          delete-branch: true
          title: 'debian-releases: update hardcoded release info'
          body: |
            Automated update — upstream release info has changed.
            Generated by the scheduled Debian Releases workflow.
          commit-message: 'debian-releases: update hardcoded release info'
          labels: automated

      - name: Fail to indicate outdated status
        run: exit 1
